<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>梦境日记 - Icon 预览</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:-apple-system,'PingFang SC',sans-serif;
  background:#0c0a1a;color:#e8e4f0;
  min-height:100vh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:48px;
  padding:40px 20px;
}
h1{font-size:28px;font-weight:300;letter-spacing:6px;opacity:.8}
.row{display:flex;gap:36px;align-items:end;flex-wrap:wrap;justify-content:center}
.item{display:flex;flex-direction:column;align-items:center;gap:10px}
.item img,.item .icon-box{border-radius:22%;box-shadow:0 8px 32px rgba(167,139,250,.2),0 0 0 1px rgba(255,255,255,.06)}
.item .size{font-size:12px;color:rgba(232,228,240,.4);letter-spacing:1px}
.context{display:flex;gap:40px;margin-top:20px;flex-wrap:wrap;justify-content:center}
.phone{
  width:220px;height:400px;border-radius:32px;
  background:linear-gradient(145deg,#1a1040,#0c0a1a);
  border:2px solid rgba(255,255,255,.08);
  display:flex;flex-direction:column;align-items:center;
  padding:60px 16px 20px;gap:12px;
  box-shadow:0 20px 60px rgba(0,0,0,.5);position:relative;
}
.phone::before{
  content:'';position:absolute;top:20px;left:50%;transform:translateX(-50%);
  width:60px;height:6px;border-radius:3px;background:rgba(255,255,255,.1);
}
.phone .grid{
  display:grid;grid-template-columns:repeat(4,1fr);gap:14px 12px;
  width:100%;padding:20px 8px;
}
.phone .app{display:flex;flex-direction:column;align-items:center;gap:4px}
.phone .app .ic{width:44px;height:44px;border-radius:12px;background:rgba(255,255,255,.06)}
.phone .app .ic.dream{border-radius:12px;overflow:hidden;background:none}
.phone .app .ic.dream img{width:100%;height:100%;object-fit:cover}
.phone .app span{font-size:8px;color:rgba(232,228,240,.5);max-width:48px;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.phone .dock{
  position:absolute;bottom:16px;left:20px;right:20px;
  display:flex;justify-content:center;gap:20px;
  padding:8px 16px;background:rgba(255,255,255,.04);border-radius:20px;
}
.phone .dock .ic{width:36px;height:36px;border-radius:10px;background:rgba(255,255,255,.06)}
.tab{
  width:320px;height:50px;border-radius:12px;
  background:linear-gradient(90deg,#1a1040,#0c0a1a);
  border:1px solid rgba(255,255,255,.08);
  display:flex;align-items:center;padding:0 14px;gap:10px;
  box-shadow:0 8px 32px rgba(0,0,0,.3);
}
.tab .fav{width:16px;height:16px;border-radius:3px;overflow:hidden;flex-shrink:0}
.tab .fav img{width:100%;height:100%}
.tab .title{font-size:12px;color:rgba(232,228,240,.6);flex:1}
.tab .url{font-size:10px;color:rgba(232,228,240,.25);flex-shrink:0}
.tab-row{display:flex;flex-direction:column;gap:8px}

.section-title{font-size:14px;color:rgba(232,228,240,.35);letter-spacing:4px;text-transform:uppercase;margin-top:20px}
</style>
</head>
<body>

<h1>梦境日记 ICON</h1>

<!-- 各尺寸预览 -->
<div class="row">
  <div class="item">
    <img src="icon.svg" width="192" height="192">
    <span class="size">192 × 192</span>
  </div>
  <div class="item">
    <img src="icon.svg" width="128" height="128">
    <span class="size">128 × 128</span>
  </div>
  <div class="item">
    <img src="icon.svg" width="64" height="64">
    <span class="size">64 × 64</span>
  </div>
  <div class="item">
    <img src="icon.svg" width="32" height="32">
    <span class="size">32 × 32</span>
  </div>
  <div class="item">
    <img src="icon.svg" width="16" height="16">
    <span class="size">16 × 16</span>
  </div>
</div>

<span class="section-title">实际使用场景</span>

<div class="context">
  <!-- 手机桌面模拟 -->
  <div class="phone">
    <div class="grid">
      <div class="app"><div class="ic"></div><span>相机</span></div>
      <div class="app"><div class="ic"></div><span>相册</span></div>
      <div class="app"><div class="ic dream"><img src="icon.svg"></div><span>梦境日记</span></div>
      <div class="app"><div class="ic"></div><span>设置</span></div>
      <div class="app"><div class="ic"></div><span>音乐</span></div>
      <div class="app"><div class="ic"></div><span>备忘录</span></div>
      <div class="app"><div class="ic"></div><span>天气</span></div>
      <div class="app"><div class="ic"></div><span>计算器</span></div>
    </div>
    <div class="dock">
      <div class="ic"></div>
      <div class="ic"></div>
      <div class="ic"></div>
      <div class="ic"></div>
    </div>
  </div>

  <!-- 浏览器标签模拟 -->
  <div class="tab-row" style="align-self:center">
    <span class="section-title" style="margin:0;font-size:11px">浏览器标签</span>
    <div class="tab">
      <div class="fav"><img src="icon.svg"></div>
      <span class="title">梦境日记</span>
      <span class="url">localhost:8090</span>
    </div>
    <div class="tab" style="opacity:.5">
      <div class="fav" style="background:rgba(255,255,255,.06)"></div>
      <span class="title">New Tab</span>
      <span class="url"></span>
    </div>
  </div>
</div>

</body>
</html>
